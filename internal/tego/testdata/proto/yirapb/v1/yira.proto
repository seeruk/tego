edition = "2024";
package yirapb.v1;

import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "tego/options.proto";

option go_package = "github.com/seeruk/tego/internal/tego/testdata/proto/yirapbv1;yirapbv1";
option (tego.file).go_package = "github.com/seeruk/tego/internal/tego/testdata/yira/v1;yirav1";

service TicketService {
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc UpdateTicket(UpdateTicketRequest) returns (UpdateTicketResponse);
  rpc CloseTicket(CloseTicketRequest) returns (google.protobuf.Empty);
  rpc WatchTicketEvents(WatchTicketEventsRequest) returns (stream TicketEvent);
  rpc ImportTicketEvents(stream TicketEvent) returns (ImportTicketEventsResponse);
  rpc SyncTicketEvents(stream TicketEvent) returns (stream TicketEvent);
}

message ListTicketsRequest {
  string project_id = 1;
  TicketFilter filter = 2;
  CursorRequest cursor = 3;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
  TicketsByStatus tickets_by_status = 2;
  CursorResponse cursor = 3;
}

message GetTicketRequest {
  string ticket_id = 1;
}

message GetTicketResponse {
  Ticket ticket = 1;
}

message CreateTicketRequest {
  TicketDraft ticket = 1;
}

message CreateTicketResponse {
  Ticket ticket = 1;
}

message UpdateTicketRequest {
  string ticket_id = 1;
  TicketPatch patch = 2;
}

message UpdateTicketResponse {
  Ticket ticket = 1;
}

message CloseTicketRequest {
  string ticket_id = 1;
  string resolution = 2;
}

message WatchTicketEventsRequest {
  string project_id = 1;
  string ticket_id = 2;
}

message ImportTicketEventsResponse {
  int32 imported_count = 1;
}

enum TicketStatus {
  option (tego.enum) = {
    name: "TicketStatus"
    underlying_type: ENUM_UNDERLYING_TYPE_UINT
  };

  TICKET_STATUS_UNSPECIFIED = 0 [(tego.enum_value) = {
    name: "TicketStatusUnknown"
    comment: "TicketStatus is the current lifecycle state of a ticket."
    uint: 0
  }];
  TICKET_STATUS_OPEN = 1;
  TICKET_STATUS_IN_PROGRESS = 2;
  TICKET_STATUS_BLOCKED = 3;
  TICKET_STATUS_CLOSED = 4;
}

enum TicketPriority {
  TICKET_PRIORITY_UNSPECIFIED = 0;
  TICKET_PRIORITY_LOW = 1;
  TICKET_PRIORITY_NORMAL = 2;
  TICKET_PRIORITY_HIGH = 3;
}

message Ticket {
  enum Visibility {
    VISIBILITY_UNSPECIFIED = 0;
    VISIBILITY_PUBLIC = 1;
    VISIBILITY_PRIVATE = 2;
  }

  string id = 1 [(tego.field).json_tag = {
    value: "id"
    omitempty: true
  }];
  string project_id = 2;
  string title = 3;
  string description = 4;
  TicketStatus status = 5;
  TicketPriority priority = 6;
  NullablePerson assignee = 7;
  Person reporter = 8;
  PersonList watchers = 9;
  Labels labels = 10;
  DueDate due_date = 11;
  Visibility visibility = 12;
  google.protobuf.Struct metadata = 13;

  oneof source {
    string manual_source = 14;
    google.protobuf.Any integration_source = 15;
  }

  repeated TicketEvent events = 16;
}

message TicketDraft {
  string project_id = 1;
  string title = 2;
  string description = 3;
  TicketPriority priority = 4;
  Person reporter = 5;
  DueDate due_date = 6;
  Labels labels = 7;
  google.protobuf.Struct metadata = 8;
}

message TicketPatch {
  option (tego.message).fields.omittable = true;

  string title = 1;
  string description = 2;
  TicketStatus status = 3;
  TicketPriority priority = 4;
  NullablePerson assignee = 5;
  DueDate due_date = 6;
  Labels labels = 7;
  google.protobuf.Struct metadata = 8;
  string version = 9 [(tego.field).omittable = false];
}

message TicketFilter {
  repeated TicketStatus statuses = 1;
  NullablePerson assignee = 2;
  Labels labels = 3;
}

message TicketEvent {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_CREATED = 1;
    KIND_UPDATED = 2;
    KIND_COMMENTED = 3;
    KIND_CLOSED = 4;
  }

  string id = 1;
  Kind kind = 2;
  Person actor = 3;
  string note = 4;
  google.protobuf.Value payload = 5;
  google.protobuf.ListValue attachments = 6;
}

message Person {
  string id = 1;
  string display_name = 2;
  string email = 3;
}

message CursorRequest {
  int32 limit = 1;
  string after_cursor = 2;
}

message CursorResponse {
  string next_cursor = 1;
}

message NullablePerson {
  oneof value {
    Person person = 1;
    google.protobuf.NullValue null = 2;
  }
}

message DueDate {
  option (tego.message).flatten = true;

  string value = 1 [(tego.field).go_type = {
    ref: "github.com/seeruk/tego/internal/tego/testdata/yira/v1/types.Date"
    from_proto: "github.com/seeruk/tego/internal/tego/testdata/yira/v1/types.DateFromProto"
    to_proto: "github.com/seeruk/tego/internal/tego/testdata/yira/v1/types.DateToProto"
    comparable: true
  }];
}

message Labels {
  option (tego.message).flatten = true;

  repeated string values = 1 [(tego.field).go_type = {
    ref: "github.com/seeruk/tego/internal/tego/testdata/yira/v1/types.Set[T]"
    from_proto: "github.com/seeruk/tego/internal/tego/testdata/yira/v1/types.LabelSetFromProto"
    to_proto: "github.com/seeruk/tego/internal/tego/testdata/yira/v1/types.LabelSetToProto"
    type_args: {
      key: "T"
      value: {type: "github.com/seeruk/tego/internal/tego/testdata/yira/v1/types.Label"}
    }
  }];
}

message PersonList {
  repeated Person people = 1;
}

message TicketsByStatus {
  message Map {
    TicketStatus key = 1;
    repeated Ticket value = 2;
  }

  repeated Map entries = 1;
}
