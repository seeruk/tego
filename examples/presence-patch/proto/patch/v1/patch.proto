edition = "2024";
package patch.v1;

import "google/protobuf/struct.proto";
import "tego/options.proto";

option go_package = "github.com/seeruk/tego/examples/presence-patch/patchpbv1;patchpbv1";
option (tego.file).go_package = "github.com/seeruk/tego/examples/presence-patch/patch;patch";

message NullableString {
  oneof value {
    string text = 1;
    google.protobuf.NullValue null = 2;
  }
}

// UpdateProfileRequest is an example of what a "patching" update request might look like.
//
// You can control omittability across the whole message with the message-level fields options, and
// also individually toggle field omittability back off with the field-level options.
//
// Fields can still be nullable while omittable, and this is very useful (e.g. only update this
// database column if a value is set, but allow it to be null). To achieve this though, the value
// must be wrapped in a nullable-shape wrapper in Protobuf, otherwise there's no way to distinguish
// between "not set" and "set to null" at the Protobuf level. This will still translate cleanly to
// an omittable.Of[*T] in your Tego Go output.
message UpdateProfileRequest {
  option (tego.message).fields.omittable = true;

  string display_name = 1;
  NullableString bio = 2;
  google.protobuf.Struct preferences = 3;
  string actor_id = 4 [(tego.field).omittable = false];
}
