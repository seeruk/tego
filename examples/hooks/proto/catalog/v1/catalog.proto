edition = "2024";
package catalog.v1;

import "tego/options.proto";

option go_package = "github.com/seeruk/tego/examples/hooks/catalogpbv1;catalogpbv1";
option (tego.file).go_package = "github.com/seeruk/tego/examples/hooks/catalog;catalog";

service CatalogService {
  rpc GetBook(GetBookRequest) returns (GetBookResponse);
}

message GetBookRequest {
  string id = 1;
}

message GetBookResponse {
  Book book = 1;
}

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  string display_title = 4;
  string catalog_ref = 5;
  string legacy_book_id = 6 [(tego.field).omit = true];
}
