edition = "2024";
package hello.v1;

import "tego/options.proto";

option go_package = "github.com/seeruk/tego/examples/quickstart/hellopbv1;hellopbv1";
option (tego.file).go_package = "github.com/seeruk/tego/examples/quickstart/hello;hello";

service GreeterService {
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse);
}

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string message = 1;
}
