edition = "2024";
package books.v1;

import "tego/options.proto";

option go_package = "github.com/seeruk/tego/examples/error-mapping/bookspbv1;bookspbv1";
option (tego.file).go_package = "github.com/seeruk/tego/examples/error-mapping/books;books";

service BookService {
  rpc GetBook(GetBookRequest) returns (GetBookResponse);
}

message GetBookRequest {
  string id = 1;
}

message GetBookResponse {
  Book book = 1;
}

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
}
