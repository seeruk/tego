version: v2

plugins:
- local: [go, tool, protoc-gen-go]
  out: .
  opt:
  - paths=import
  - module=github.com/seeruk/tego/examples/error-mapping
- local: [go, tool, protoc-gen-go-grpc]
  out: .
  opt:
  - paths=import
  - module=github.com/seeruk/tego/examples/error-mapping
- local: [go, tool, protoc-gen-connect-go]
  out: .
  opt:
  - paths=import
  - module=github.com/seeruk/tego/examples/error-mapping
- local: [go, run, ../../cmd/protoc-gen-tego]
  out: .
  opt:
  - paths=import
  - module=github.com/seeruk/tego/examples/error-mapping
  - rpc=connect,grpc
