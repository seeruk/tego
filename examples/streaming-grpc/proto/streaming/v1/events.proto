edition = "2024";
package streaming.v1;

import "tego/options.proto";

option go_package = "github.com/seeruk/tego/examples/streaming-grpc/streamingpbv1;streamingpbv1";
option (tego.file).go_package = "github.com/seeruk/tego/examples/streaming-grpc/streaming;streaming";

service EventService {
  rpc Watch(WatchRequest) returns (stream WatchResponse);
  rpc Import(stream ImportRequest) returns (ImportResponse);
  rpc Chat(stream ChatRequest) returns (stream ChatResponse);
}

message WatchRequest {
  string topic = 1;
}

message Event {
  string topic = 1;
  string message = 2;
}

message WatchResponse {
  Event event = 1;
}

message ImportRequest {
  Event event = 1;
}

message ImportResponse {
  int32 count = 1;
}

message ChatRequest {
  Event event = 1;
}

message ChatResponse {
  Event event = 1;
}
