edition = "2024";
package tego;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/seeruk/tego/tegopb;tegopb";

// 20570 should be a unique enough starting point for Tego:
// T = 20, E = 5, G = 7

extend google.protobuf.FileOptions {
  FileOptions file = 20570;
}

message FileOptions {
  // go_package works the same way the top-level `go_package` option works, but is required to
  // control where Tego will generate its output.
  string go_package = 1;
  // output_path is used to specify the output path for the generated Go code.
  // TODO: Is this one necessary?
  string output_path = 2;
}

extend google.protobuf.EnumOptions {
  EnumOptions enum = 20570;
}

message EnumOptions {
  // name is used to override the name of the corresponding generated Go type.
  string name = 1;
  // comment is used to override the comment to be added to the corresponding generated Go type.
  string comment = 2;
  // omit indicates that this enum should not generate a corresponding Go type.
  bool omit = 3;
  // underlying_type is used to specify the underlying type of the enum generated in Go. By default,
  // Tego will generate uint-based enums.
  EnumUnderlyingType underlying_type = 4;
}

enum EnumUnderlyingType {
  ENUM_UNDERLYING_TYPE_UNSPECIFIED = 0;
  ENUM_UNDERLYING_TYPE_UINT = 1;
  ENUM_UNDERLYING_TYPE_INT = 2;
  ENUM_UNDERLYING_TYPE_STRING = 3;
}

extend google.protobuf.EnumValueOptions {
  EnumValueOptions enum_value = 20570;
}

message EnumValueOptions {
  // name is used to override the name of the corresponding generated Go constant.
  string name = 1;
  // comment is used to override the comment to be added to the corresponding generated Go constant.
  string comment = 2;
  // omit indicates that this enum value should not generate a corresponding Go constant.
  bool omit = 3;
  // value is used to override the value of the corresponding generated Go constant. The oneof value
  // used must match the underlying type of the enum, or be left unset to use the default value.
  oneof value {
    uint64 uint = 4;
    int64 int = 5;
    string string = 6;
  }
}

extend google.protobuf.MessageOptions {
  MessageOptions message = 20570;
}

message MessageOptions {
  // name is used to override the name of the corresponding generated Go type.
  string name = 1;
  // comment is used to override the comment to be added to the corresponding generated Go type.
  string comment = 2;
  // go_type is used to specify a custom Go type to use for this message. This will mean Tego does
  // not generate a corresponding Go type for this message, and instead will use the specified Go
  // type and mapping provided.
  GoType go_type = 3;
  // omit indicates that this message should not generate a corresponding Go type.
  bool omit = 4;
  // fields_omittable indicates that the fields on this message should generate as omittable fields
  // in the generated Go code by default. This is intended for types where you want to be able to
  // identify presence of a field; for example, an input type for updating a resource where you only
  // want to update the fields that are present in the input.
  bool fields_omittable = 5;
  // infer_shape may be set to false to disable inferring a shape for this message. That means, Tego
  // will not flatten this message when it's used as a field in another message based on the shape.
  bool infer_shape = 6 [default = true];
}

extend google.protobuf.FieldOptions {
  FieldOptions field = 20570;
}

message FieldOptions {
  // name is used to override the name of the corresponding generated Go field.
  string name = 1;
  // comment is used to override the comment to be added to the corresponding generated Go field.
  string comment = 2;
  // go_type is used to specify a custom Go type to use for this field.
  GoType go_type = 3;
  // omit indicates that this field should not generate a corresponding Go field.
  // This can be handy for Proto-specific / transport-only fields.
  bool omit = 4;
  // tags is used to specify custom struct tags to be added to the corresponding generated Go field.
  repeated GoStructTag tags = 5;
  // json_tag is used to more easily specify a JSON struct tag to be added to the corresponding
  // generated Go field.
  GoJsonStructTag json_tag = 6;
  // omittable indicates that this field should generate as an omittable field in the generated Go.
  // This can be used to override the default behavior of the parent message's omittable option, or
  // to simply mark an individual field as omittable.
  bool omittable = 7;
  // nullable indicates that this field should generate as a nullable field in the generated Go.
  // This option will only work on fields that are messages, as they are nullable by default in the
  // code generated by protoc-gen-go, unlike other types.
  bool nullable = 8;
}

message GoJsonStructTag {
  string value = 1;
  bool omitempty = 2;
  bool omitzero = 3;
}

message GoStructTag {
  string key = 1;
  string value = 2;
}

message GoType {
  // ref is a reference to a Go type, which should be a fully-qualified Go type name, including
  // the package path. For example: github.com/example/project/pkg.MyType
  string ref = 1;
  // from_proto is a reference to a Go function that converts from the Go type generated by
  // protoc-gen-go to the custom Go type specified in `ref`. The supported signatures are:
  // - func(*protoType) customType
  // - func(*protoType) *customType
  // - func(*protoType) (customType, error)
  // - func(*protoType) (*customType, error)
  string from_proto = 2;
  // to_proto is a reference to a Go function that converts from the custom Go type specified in
  // `ref` to the Go type generated by protoc-gen-go. The supported signatures are:
  // - func(customType) *protoType
  // - func(*customType) *protoType
  // - func(customType) (*protoType, error)
  // - func(*customType) (*protoType, error)
  string to_proto = 3;
  // comparable may be set to true when this custom Go type is valid as a Go map key.
  bool comparable = 4;
  // as_pointer may be set to true when this custom Go type should always be used as a pointer in
  // generated Go code. For example, ref github.com/example/project/pkg.MyType will be planned as
  // *pkg.MyType.
  bool as_pointer = 5;
}
