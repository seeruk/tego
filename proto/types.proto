edition = "2024";
package pos;

import "google/protobuf/go_features.proto";

option go_package = "github.com/seeruk/tego/proto;proto";
option features.(pb.go).strip_enum_prefix = STRIP_ENUM_PREFIX_STRIP;

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
}

message OneOfMany {
  oneof value {
    string string_value = 1;
    int32 int_value = 2;
    bool bool_value = 3;
  }
}

message UpdateRequest {
  string id = 1 [features.field_presence = LEGACY_REQUIRED];
  Strings ids = 2;
  Strings ids2 = 3;

  message FieldMask {
    bool id = 1;
    bool ids = 2;
    bool ids2 = 3;
  }

  FieldMask field_mask = 60000;
}

message Strings {
  repeated string values = 1;
}
