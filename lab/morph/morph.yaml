# yaml-language-server: $schema=https://raw.githubusercontent.com/seeruk/morph/refs/heads/main/schemas/config.schema.json
defaults:
  packages:
    output:
      strategy: single_package
      path: mapping
      package: mapping
      filename: mapping.morph.go
    types:
      bidirectional: true
      callables:
      - github.com/seeruk/tego/lab/morph/tego.PersonListFromProto
      - github.com/seeruk/tego/lab/morph/tego.PersonListToProto
      - github.com/seeruk/tego/lab/morph/tego.NullablePersonListFromProto
      - github.com/seeruk/tego/lab/morph/tego.NullablePersonListToProto
      - github.com/seeruk/tego/lab/morph/tego.NestedPersonListsFromProto
      - github.com/seeruk/tego/lab/morph/tego.NestedPersonListsToProto

packages:
- source: github.com/seeruk/tego/lab/morphpb/v1
  target: github.com/seeruk/tego/lab/morph/tego
  types:
  - name: Fixture
    struct:
      inferMethods: false
      properties:
      - name: ID
        accessors:
          forward:
            read: GetId
            write: ID
          inverse:
            read: ID
            write: SetId
      - name: People
        accessors:
          forward:
            read: GetPeople
            write: People
          inverse:
            read: People
            write: SetPeople
      omit:
        source:
        - XXX_presence
        - XXX_raceDetectHookData
    mappers:
      forward:
        signature:
          accepts: pointer
          returns: value
      inverse:
        signature:
          accepts: value
          returns: pointer
  - name: Person
    struct:
      inferMethods: false
      properties:
      - name: FirstName
        accessors:
          forward:
            read: GetFirstName
            write: FirstName
          inverse:
            read: FirstName
            write: SetFirstName
      - name: LastName
        accessors:
          forward:
            read: GetLastName
            write: LastName
          inverse:
            read: LastName
            write: SetLastName
      omit:
        source:
        - XXX_presence
        - XXX_raceDetectHookData
    mappers:
      forward:
        signature:
          accepts: pointer
          returns: value
      inverse:
        signature:
          accepts: value
          returns: pointer
